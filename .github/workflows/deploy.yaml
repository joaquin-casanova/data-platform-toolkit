name: Deploy to AWS CodeArtifact

on:
  workflow_run:
    workflows: ["Tagging and Release Notes"]
    types: [completed]
  push:
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'development' || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: List dist
        run: ls -la dist/

      - name: Determine branch
        id: extract_branch
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            branch="development"
          else
            branch=${GITHUB_REF_NAME}
          fi
          echo "branch=${branch}" >> $GITHUB_OUTPUT

      - name: Determine AWS role and domain owner
        id: determine_role
        run: |
          if [[ "${{ steps.extract_branch.outputs.branch }}" == "main" ]]; then
            echo "AWS_ROLE=${{ secrets.DATA_PLATFORM_TOOLKIT_AWS_ROLE_PROD }}" >> $GITHUB_ENV
            echo "DOMAIN_OWNER=${{ secrets.DATA_PLATFORM_TOOLKIT_AWS_ACCOUNT_ID_PROD }}" >> $GITHUB_ENV
            echo "CODEARTIFACT_REPO=${{ secrets.DATA_PLATFORM_TOOLKIT_CODEARTIFACT_REPO_PROD }}" >> $GITHUB_ENV
          else
            echo "AWS_ROLE=${{ secrets.DATA_PLATFORM_TOOLKIT_AWS_ROLE_DEV }}" >> $GITHUB_ENV
            echo "DOMAIN_OWNER=${{ secrets.DATA_PLATFORM_TOOLKIT_AWS_ACCOUNT_ID_DEV }}" >> $GITHUB_ENV
            echo "CODEARTIFACT_REPO=${{ secrets.DATA_PLATFORM_TOOLKIT_CODEARTIFACT_REPO_DEV }}" >> $GITHUB_ENV
          fi

      - name: Assume AWS IAM Role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: us-west-2

      - name: Get version
        run: |
          current_version=$(jq -r .version version.json)
          echo "VERSION=$current_version" >> $GITHUB_ENV
          echo "Publishing version: $current_version"

      - name: Authenticate to AWS CodeArtifact
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain ${{ secrets.DATA_PLATFORM_TOOLKIT_CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ env.DOMAIN_OWNER }} \
            --query authorizationToken \
            --output text)
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Upload to CodeArtifact
        run: |
          REPO_URL="https://${{ secrets.DATA_PLATFORM_TOOLKIT_CODEARTIFACT_DOMAIN }}-${{ env.DOMAIN_OWNER }}.d.codeartifact.us-west-2.amazonaws.com/pypi/${{ env.CODEARTIFACT_REPO }}/"
          echo "Publishing to: $REPO_URL"
          for file in dist/*; do
            twine upload \
              --verbose \
              --repository-url "$REPO_URL" \
              --username aws \
              --password "${{ env.TOKEN }}" \
              "$file"
          done
